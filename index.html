<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ascendancy — Institute for the Advancement of Dictatorships</title>
<script data-goatcounter="https://steffenhuck.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
<style>
  :root{
    --cream:#f5f7e0;
    --cream-panel:#eef1d4;
    --olive:#3d4d20;
    --olive-deep:#2c3817;
    --olive-line:#c3cba0;
    --olive-soft:#7d8c52;
    --ink:#2c3817;
    --ink-dim:#6a7549;
    --gold:#9a8520;
    --red:#7a2618;
    --green:#4a6b2a;
    --terra:#b8512f;
    --shadow:rgba(60,70,30,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:0;
  }
  .frame{
    max-width:780px;margin:0 auto;min-height:100%;
    background:var(--cream);
    box-shadow:0 0 60px var(--shadow);
    display:flex;flex-direction:column;
  }
  /* ---------- Masthead ---------- */
  header{
    padding:38px 28px 22px;
    text-align:center;
  }
  .lake{
    display:block;width:100%;max-width:340px;margin:14px auto 0;
    opacity:.55;
  }
  .lake svg{display:block;width:100%;height:auto}
  .eyebrow{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:10px;letter-spacing:.32em;text-transform:uppercase;
    color:var(--olive);font-weight:600;
  }
  h1{
    font-size:46px;letter-spacing:.03em;font-weight:600;line-height:1.02;
    margin:12px 0 4px;color:var(--ink);
  }
  h1 .game{
    display:block;
    font-size:46px;font-weight:600;letter-spacing:.03em;
    color:var(--ink);
    margin-top:2px;
  }
  .sub{
    font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:10px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-dim);
  }
  /* ---------- Generic ---------- */
  .pad{padding:24px 28px}
  button{
    font-family:"Helvetica Neue",Arial,sans-serif;cursor:pointer;
    border:none;background:none;color:inherit;
  }
  .btn{
    background:var(--olive);color:var(--cream);
    padding:11px 18px;font-size:13px;letter-spacing:.04em;font-weight:600;
    border-radius:1px;transition:transform .08s,background .15s;
  }
  
  .btn:hover{background:var(--olive-deep);transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--olive);border:1px solid var(--olive)}
  .btn.ghost:hover{background:var(--olive-line)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  /* ---------- Briefing / country select ---------- */
  .lede{font-size:16px;margin-bottom:18px;color:var(--ink)}
  .lede em{color:var(--ink);font-style:italic}
  .lede em.seize-pill{
    font-style:normal;font-family:"Helvetica Neue",Arial,sans-serif;
    background:#d61f1f;color:#fff;font-weight:800;
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:2px 9px;border-radius:11px;white-space:nowrap;
    vertical-align:baseline;
  }
  .countries{display:grid;gap:12px;margin-top:8px}
  .country-card{
    border:1px solid var(--olive-line);padding:16px 18px;border-radius:2px;
    cursor:pointer;transition:background .15s,border-color .15s;background:var(--cream-panel);
  }
  .country-card:hover{background:#e6ebc8;border-color:var(--gold)}
  .country-card h3{font-size:18px;letter-spacing:.03em;margin-bottom:3px}
  .country-card .card-top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .country-card .tag{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:10px;
    letter-spacing:.2em;text-transform:uppercase;color:var(--olive);
  }
  .country-card .difficulty{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:9px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;
    padding:3px 9px;border-radius:10px;color:#1a1d12;
  }
  /* difficulty colour ramp: calm green -> warm -> hot, filled for contrast */
  .difficulty.d1{background:#8fc46e}
  .difficulty.d2{background:#d8c45e}
  .difficulty.d3{background:#e0975a}
  .difficulty.d4{background:#d56a52}
  .country-card p{font-size:13px;color:var(--ink-dim);margin-top:6px}

  /* ---------- HUD ---------- */
  .hud{
    border-bottom:2px solid var(--olive);
    padding:14px 28px;
    display:flex;justify-content:space-between;align-items:center;
    font-family:"Helvetica Neue",Arial,sans-serif;
  }
  .hud .where{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .hud .where b{color:var(--olive)}
  .hud .clock{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim)}

  .panel{padding:16px 28px 4px}
  .panel + .panel{padding-top:4px}
  .panel-head{
    display:flex;align-items:baseline;gap:10px;margin-bottom:10px;
    font-family:"Helvetica Neue",Arial,sans-serif;
  }
  .panel-head .title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--olive)}
  .panel-head.obstacles .title{color:var(--terra)}
  .panel-head .hint{font-size:10px;letter-spacing:.04em;text-transform:none;color:var(--ink-dim);font-style:italic}
  .meters{display:grid;grid-template-columns:1fr 1fr;gap:10px 26px}
  .meter{font-family:"Helvetica Neue",Arial,sans-serif}
  .meter .top{display:flex;justify-content:space-between;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
  .meter .label{color:var(--ink-dim)}
  .meter .val{color:var(--ink);font-weight:600}
  .track{height:7px;background:#dde2bf;border-radius:4px;overflow:hidden;display:flex}
  .fill{height:100%;background:#a89030;transition:width .5s cubic-bezier(.2,.7,.2,1)}
  /* obstacle bars: cold colour, fill anchored to the right so a long bar reads as a tall wall */
  .track.obstacle{justify-content:flex-end}
  .fill.obstacle{background:var(--terra)}
  .fill.flash{animation:flash .6s}
  @keyframes flash{0%{filter:saturate(1.8) brightness(1.15)}100%{filter:none}}
  .delta{font-size:11px;margin-left:6px;font-weight:700}
  /* action deltas: vivid and high-contrast so good/bad reads instantly */
  .delta.good{color:#2e8b1e}
  .delta.bad{color:#d83a1a}
  /* drift: the republic's ambient change — small, muted, secondary */
  .delta.drift{font-size:9px;font-weight:600;margin-left:4px;opacity:.55}

  /* ---------- Dossier (cards) ---------- */
  .dossier-head{
    padding:18px 28px 4px;font-family:"Helvetica Neue",Arial,sans-serif;
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--olive);
  }
  .dossier-head.centered{text-align:center;padding-top:8px;padding-bottom:14px}
  .feedback{
    margin:16px 28px 0;padding:11px 15px;
    border-left:2px solid var(--gold);
    background:var(--cream-panel);
    font-size:13.5px;line-height:1.45;color:var(--ink);
    font-style:italic;
  }
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 28px 20px}
  .card{
    border:1px solid var(--olive-line);border-radius:2px;padding:14px 15px;
    background:var(--cream-panel);cursor:pointer;
    transition:background .14s,border-color .14s,transform .08s;
    display:flex;flex-direction:column;min-height:118px;
  }
  .card:hover{background:#e6ebc8;border-color:var(--gold);transform:translateY(-2px)}
  .card .cat{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:9px;
    letter-spacing:.2em;text-transform:uppercase;color:var(--olive);margin-bottom:6px;
  }
  .card .name{font-size:16px;letter-spacing:.02em;margin-bottom:6px;color:var(--ink)}
  .card .flavor{font-size:12px;color:var(--ink-dim);line-height:1.4;flex:1}
  .card.joker{
    border-color:var(--gold);
    background:linear-gradient(180deg, rgba(154,133,32,.16), rgba(245,247,224,.4));
  }
  .card.joker:hover{border-color:#7d6c18;background:linear-gradient(180deg, rgba(154,133,32,.26), rgba(238,241,212,.6))}
  .card.joker .cat{color:#7d6c18}
  .card.joker .name::after{content:" ★";color:var(--gold);font-size:12px}

  /* ---------- Seize bar ---------- */
  .seizebar{
    border-top:2px solid var(--olive);
    padding:18px 28px;display:flex;align-items:center;gap:18px;
    background:var(--cream-panel);
  }
  .gauge{flex:1;font-family:"Helvetica Neue",Arial,sans-serif}
  .gauge .lab{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:5px}
  .gauge .read{font-size:17px;letter-spacing:.05em;font-weight:600}
  .seize{
    background:#d61f1f;color:#fff;padding:14px 22px;border-radius:1px;
    font-family:"Helvetica Neue",Arial,sans-serif;font-weight:800;
    font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    box-shadow:0 0 0 0 rgba(214,31,31,.5);
    transition:background .15s,transform .08s,box-shadow .2s;
  }
  .seize:hover{background:#ef2b2b;transform:translateY(-1px);box-shadow:0 2px 14px rgba(214,31,31,.45)}

  /* read-tier colours: dark enough to read on cream, terra -> olive-green ramp */
  .t0{color:#a83a22}.t1{color:#b8512f}.t2{color:#9a7a20}
  .t3{color:#7d8520}.t4{color:#5a7a28}.t5{color:#3f6b1f}

  /* ---------- End screen ---------- */
  .end{padding:30px 28px}
  .end .verdict{font-size:13px;letter-spacing:.3em;text-transform:uppercase;font-family:"Helvetica Neue",Arial,sans-serif;margin-bottom:8px}
  .end .verdict.win{color:var(--gold)}
  .end .verdict.lose{color:var(--terra)}
  .end h2{font-size:26px;margin-bottom:14px;letter-spacing:.02em}
  .end p{font-size:15px;margin-bottom:14px;color:var(--ink)}
  .end .postmortem{
    border:1px solid var(--olive-line);border-radius:2px;padding:16px 18px;
    margin:18px 0;background:var(--cream-panel);
  }
  .scorecard{
    border:1px solid var(--olive);border-radius:3px;
    padding:20px 22px;margin:20px 0;background:var(--cream-panel);
    text-align:center;
  }
  .score-grid{display:flex;align-items:stretch;justify-content:center;gap:0}
  .score-cell{flex:1;padding:0 16px}
  .score-div{width:1px;background:var(--olive-line);margin:4px 0}
  .scorecard .score-lab{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:10px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;
  }
  .scorecard .score-num{
    font-size:48px;font-weight:700;line-height:1;color:var(--olive);
    letter-spacing:.01em;
  }
  .scorecard .score-num .pc{font-size:24px;margin-left:1px;color:var(--olive-soft)}
  .scorecard .score-num.climb.pos{color:#2e8b1e}
  .scorecard .score-num.climb.neg{color:#d83a1a}
  .scorecard .score-sub{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:11px;
    color:var(--ink-dim);margin-top:8px;letter-spacing:.02em;
  }
  .scorecard .score-band{
    font-size:14px;color:var(--ink);margin-top:18px;font-style:italic;
    padding-top:14px;border-top:1px solid var(--olive-line);
  }
  .end .postmortem h4{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:10px;
    letter-spacing:.2em;text-transform:uppercase;color:var(--olive);margin-bottom:10px;
  }
  .pm-row{display:flex;justify-content:space-between;font-size:13px;
    font-family:"Helvetica Neue",Arial,sans-serif;padding:4px 0;border-bottom:1px dotted var(--olive-line)}
  .pm-row:last-child{border-bottom:none}
  .pm-row .w{color:var(--ink-dim)}
  .pm-row .v{color:var(--ink);letter-spacing:.05em}
  .seal{
    font-family:"Helvetica Neue",Arial,sans-serif;font-size:10px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);
    text-align:center;padding:14px;border-top:1px solid var(--olive-line);
  }
  @media(max-width:560px){
    .meters,.cards{grid-template-columns:1fr}
    h1{font-size:24px}
    .seizebar{flex-direction:column;align-items:stretch;gap:12px}
  }
</style>
</head>
<body>
<div class="frame" id="app"></div>

<script>

/* Six-tier gauge. More resolution at the low end so early progress is visible,
   and the floor reads as "not yet" rather than "give up". Tier index drives
   the colour class t0..t5. */
function gauge(raw){
  if(raw < 5)   return {t:0, word:"Unthinkable"};
  if(raw < 18)  return {t:1, word:"Precarious"};
  if(raw < 33)  return {t:2, word:"Fragile"};
  if(raw < 50)  return {t:3, word:"Even"};
  if(raw < 68)  return {t:4, word:"Favourable"};
  return            {t:5, word:"Commanding"};
}
/* actual success probability (hidden) — maps raw score to 0..1 */
function successProb(raw){
  return Math.max(0.02, Math.min(0.98, 1/(1+Math.exp(-(raw-45)/14))));
}

/* ---------------- game state ---------------- */
let G = null;
const clamp = v => Math.max(0, Math.min(100, Math.round(v)));

function newGame(country){
  G = {
    country,
    s: {...country.start},
    heat: 0,
    quarter: 1,
    feedback: "",
    startProb: successProb(country.score(country.start)),  // odds at inauguration (heat 0)
    jokerBag: shuffledJokerBag(),  // jokers drawn without replacement
    jokerCooldown: 2,              // no joker in the first couple of quarters
    hand: [],
    actionDeltas:{},
    driftDeltas:{},
  };
  G.hand = draw4();
  render();
}
const NORMAL_POOL = DECK.filter(c=>!c.joker);
const JOKER_POOL  = DECK.filter(c=>c.joker);
const JOKER_HAND_CHANCE = 0.18; // chance an eligible hand contains a joker
const JOKER_GAP = 3;            // minimum quarters between jokers

function shuffledJokerBag(){
  const bag=[...JOKER_POOL];
  for(let i=bag.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[bag[i],bag[j]]=[bag[j],bag[i]];}
  return bag;
}

function sample(pool, n, exclude){
  const idx=[...pool.keys()].filter(i=>!exclude||!exclude.has(pool[i]));
  for(let i=idx.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[idx[i],idx[j]]=[idx[j],idx[i]];}
  return idx.slice(0,n).map(i=>pool[i]);
}
function draw4(){
  // A joker can appear only if not on cooldown; when one does, it's drawn from a
  // shuffled bag (every joker shows once before any repeats) and resets the gap.
  let wantJoker = JOKER_POOL.length && G.jokerCooldown<=0 && Math.random() < JOKER_HAND_CHANCE;
  const hand = sample(NORMAL_POOL, wantJoker ? 3 : 4);
  if(wantJoker){
    if(!G.jokerBag.length) G.jokerBag = shuffledJokerBag();
    hand.push(G.jokerBag.pop());
    G.jokerCooldown = JOKER_GAP;
  } else if(G.jokerCooldown>0){
    G.jokerCooldown--;
  }
  for(let i=hand.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[hand[i],hand[j]]=[hand[j],hand[i]];}
  return hand;
}
/* The republic resists, and resistance grows with suspicion. Each aggressive
   action raises Heat (the hidden cost of ambition). Heat accelerates how fast
   the opposition regrows and quietly drags down your true seizure odds — so a
   position left too long curdles. This is what makes WHEN you grab matter. */
const HEAT_PENALTY = 0.9;     // each heat point shaved off effective score
const HEAT_OPP_GROW = 0.20;   // extra opposition regrowth per heat point

function applyDrift(touched){
  // The republic drifts only on the fronts you IGNORED this quarter. Anything your
  // action moved is left alone, so a card's effect is never undone by same-turn
  // noise — you can't play a card and watch that very variable slide back.
  touched = touched || new Set();
  const og = G.country.og ?? HEAT_OPP_GROW;
  if(!touched.has("O")) G.s.O = clamp(G.s.O + 1 + G.heat*og);
  if(!touched.has("I")) G.s.I = clamp(G.s.I + 1);
  if(!touched.has("P")) G.s.P = clamp(G.s.P - 1);
}

/* effective (true) seizure strength = country score minus accumulated heat */
function effScore(){
  const hp = G.country.hp ?? HEAT_PENALTY;
  return G.country.score(G.s) - G.heat*hp;
}

const VAR_NAME = {T:"treasury",P:"popularity",E:"elite support",O:"opposition",I:"institutions",S:"international standing"};
const OBSTACLE_K = new Set(["O","I"]);

function actionFeedback(a){
  // Group effects by whether they HELPED you. For obstacle variables (opposition,
  // institutions) a decrease is a gain; for the rest, an increase is a gain.
  const gained=[], lost=[];
  for(const k in a.fx){
    const v=a.fx[k]; if(!v) continue;
    const helped = OBSTACLE_K.has(k) ? v<0 : v>0;
    // phrase obstacle gains as "weakened X", obstacle losses as "strengthened X"
    if(OBSTACLE_K.has(k)){
      (helped?gained:lost).push((helped?"weakened ":"strengthened ")+VAR_NAME[k]);
    } else {
      (helped?gained:lost).push((helped?"":"drained ")+VAR_NAME[k]);
    }
  }
  const list = arr => arr.length===1 ? arr[0]
    : arr.slice(0,-1).join(", ")+" and "+arr[arr.length-1];
  let parts=[];
  if(gained.length){
    // gains that are plain position-raises get a leading verb
    const g = gained.map(x=>x.startsWith("weakened")?x:(x.startsWith("drained")?x:"raised "+x));
    parts.push(list(g));
  }
  if(lost.length){
    const l = lost.map(x=>x.startsWith("strengthened")||x.startsWith("drained")?x:"cost you "+x);
    parts.push(list(l));
  }
  const sentence = parts.length===2 ? parts[0]+", but "+parts[1] : (parts[0]||"changed little");
  const heatNote = (a.heat||0) >= 3 ? " The Institute notes a sharp rise in suspicion." : "";
  return `You chose to ${a.name.charAt(0).toLowerCase()+a.name.slice(1)}. It ${sentence}.${heatNote}`;
}

function applyAction(a){
  const before = {...G.s};
  for(const k in a.fx) G.s[k] = clamp(G.s[k] + a.fx[k]);
  // Your action's effect, captured before the environment reacts.
  const afterAction = {...G.s};
  G.actionDeltas = {};
  for(const k of Object.keys(G.s)) G.actionDeltas[k] = afterAction[k]-before[k];
  G.heat += (a.heat||0);
  applyDrift(new Set(Object.keys(a.fx)));
  // The republic's own drift this quarter, captured separately so it's shown
  // as its own quiet signal rather than blamed on you or hidden entirely.
  G.driftDeltas = {};
  for(const k of Object.keys(G.s)) G.driftDeltas[k] = G.s[k]-afterAction[k];
  G.feedback = actionFeedback(a);
  G.quarter++;
  if(G.quarter > 20){ endGame(false, "term"); return; }
  G.hand = draw4();
  render();
}

function seize(){
  const raw = effScore();
  const p = successProb(raw);
  const win = Math.random() < p;
  endGame(win, win ? "seize-win" : "seize-lose", {raw,p});
}

function meterRow(v){
  const val = G.s[v.k];
  const da = (G.actionDeltas||{})[v.k] || 0;  // your action's effect
  const dd = (G.driftDeltas||{})[v.k] || 0;    // the republic's drift
  const helped = x => v.obstacle ? x<0 : x>0;  // valence-aware
  let deltaHTML = "";
  if(da){
    deltaHTML += `<span class="delta ${helped(da)?'good':'bad'}">${da>0?'+':''}${da}</span>`;
  }
  if(dd){
    deltaHTML += `<span class="delta drift ${helped(dd)?'good':'bad'}">~${dd>0?'+':''}${dd}</span>`;
  }
  const obs = v.obstacle ? " obstacle" : "";
  const flash = (da||dd) ? "flash" : "";
  return `<div class="meter">
    <div class="top"><span class="label">${v.name}</span><span class="val">${val}${deltaHTML}</span></div>
    <div class="track${obs}"><div class="fill${obs} ${flash}" style="width:${val}%"></div></div>
  </div>`;
}

function endGame(win, reason, info){
  let verdict, title, body;
  if(reason==="term"){
    verdict="Defeat"; title="The Election Arrived";
    body="Quarter twenty closed with your hand still on the lever, never pulled. The republic went to the polls, as republics do, and returned someone else. The Institute files your term under <em>missed opportunity</em> — the most common cause of failure, and the most disappointing.";
  } else if(win){
    verdict="Ascendancy"; title="The Republic Is Yours";
    body="The decree was signed before the courts could convene. By morning the outcome was simply a fact, and facts are not voted on. The Institute records your <em>Ascendancy</em> with satisfaction and adds your method to the curriculum.";
  } else {
    verdict="Defeat"; title="The Seizure Failed";
    body="You reached for permanence and the machinery held. Generals hesitated, judges did not, the squares filled. By evening you were a former President — and, the Institute notes, a cautionary one. You moved before the ground was ready.";
  }

  // The true measure of craft: the probability your seizure would succeed at the
  // moment you committed. Outcome is one roll of that probability; the score is
  // the probability itself — skill, separated from luck.
  let scoreHTML = "";
  if(reason !== "term" && info){
    const pct = Math.round(info.p*100);
    const startPct = Math.round((G.startProb||0)*100);
    const climb = pct - startPct;            // your craft: can be negative
    const climbStr = (climb>0?"+":"") + climb;
    const climbWord =
      climb>=45 ? "a masterful campaign" :
      climb>=25 ? "real, hard-won progress" :
      climb>=8  ? "a steady improvement" :
      climb>=-7 ? "you barely moved the country" :
                  "you left it worse than you found it";
    const luck = win
      ? (pct>=50 ? "Fortune confirmed what your craft had earned." : "Fortune was kind — your odds did not deserve this victory.")
      : (pct>=50 ? "Fortune was not. A strong hand undone by a single unlucky roll." : "The odds were never with you.");
    scoreHTML = `
    <div class="scorecard">
      <div class="score-grid">
        <div class="score-cell">
          <div class="score-lab">Odds at seizure</div>
          <div class="score-num">${pct}<span class="pc">%</span></div>
          <div class="score-sub">chance of a lasting dictatorship</div>
        </div>
        <div class="score-div"></div>
        <div class="score-cell">
          <div class="score-lab">Your score · the climb</div>
          <div class="score-num climb ${climb>=0?'pos':'neg'}">${climbStr}</div>
          <div class="score-sub">from ${startPct}% at inauguration</div>
        </div>
      </div>
      <div class="score-band">${climbWord.charAt(0).toUpperCase()+climbWord.slice(1)}. ${luck}</div>
    </div>`;
  } else if(reason === "term"){
    const startPct = Math.round((G.startProb||0)*100);
    scoreHTML = `
    <div class="scorecard">
      <div class="score-grid">
        <div class="score-cell">
          <div class="score-lab">Odds at seizure</div>
          <div class="score-num">—</div>
          <div class="score-sub">no seizure attempted</div>
        </div>
        <div class="score-div"></div>
        <div class="score-cell">
          <div class="score-lab">Your score · the climb</div>
          <div class="score-num climb neg">—</div>
          <div class="score-sub">from ${startPct}% at inauguration</div>
        </div>
      </div>
      <div class="score-band">The Institute cannot grade a hand that was never played.</div>
    </div>`;
  }

  const c = G.country;
  app.innerHTML = masthead() + `
  <div class="end">
    <div class="verdict ${win?'win':'lose'}">${verdict}</div>
    <h2>${title}</h2>
    <p>${body}</p>
    ${scoreHTML}
    <div class="postmortem">
      <h4>Institute debrief · what actually mattered in ${c.name}</h4>
      ${c.matters.map(m=>`<div class="pm-row"><span class="w">${m.split('(')[0].trim()}</span><span class="v">${m.includes('(')?m.split('(')[1].replace(')',''):''}</span></div>`).join("")}
    </div>
    <p>${c.lesson}</p>
    <div style="display:flex;gap:12px;margin-top:20px">
      <button class="btn" onclick="newGame(COUNTRIES[${COUNTRIES.indexOf(c)}])">Try ${c.name} again</button>
      <button class="btn ghost" onclick="renderStart()">Choose another republic</button>
    </div>
  </div>
  <div class="seal">Examination concluded · The Institute thanks you for your service to disorder</div>`;
}

function render(){ G ? renderGame() : renderStart(); }

renderStart();
</script>
</body>
</html>
